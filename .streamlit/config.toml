[theme]
primaryColor = "#FF6B6B"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[client]
showErrorDetails = false
toolbarMode = "minimal"
gatherUsageStats = false

[logger]
level = "error"

[server]
port = 7860
headless = true
runOnSave = false
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 10
maxMessageSize = 200
